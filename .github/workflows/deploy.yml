name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            APP_DIR=/var/www/edukidvision

            # Pull latest code
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/trikkything/edukidvision.ro.git $APP_DIR
            else
              cd $APP_DIR && git pull origin main
            fi

            cd $APP_DIR

            # Write .env from GitHub secrets
            cat > .env << 'EOF'
            GMAIL_USER=${{ secrets.GMAIL_USER }}
            GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
            CONTACT_RECIPIENT=${{ secrets.CONTACT_RECIPIENT }}
            ADMIN_USER=${{ secrets.ADMIN_USER }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            PORT=3002
            EOF

            # Install dependencies (production only)
            npm ci --omit=dev

            # Start or reload with PM2
            if pm2 list | grep -q "edukidvision"; then
              pm2 reload edukidvision --update-env
            else
              pm2 start server.js --name edukidvision
              pm2 save
            fi
