<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 520 130" width="520" height="130">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&amp;display=swap');
      .brand-name { font-family: 'Outfit', system-ui, sans-serif; }
    </style>
  </defs>

  <!-- Icon mark — embedded PNG -->
  <image href="/images/logo-mark.png" x="0" y="5" width="110" height="120"/>

  <!-- "EduKid" in green -->
  <text x="124" y="72"
        font-family="'Outfit', system-ui, sans-serif"
        font-size="56" font-weight="700"
        fill="#7CBB6A"
        letter-spacing="-1">EduKid</text>

  <!-- "Vision" in teal -->
  <text x="124" y="72"
        font-family="'Outfit', system-ui, sans-serif"
        font-size="56" font-weight="700"
        fill="#009B9E"
        letter-spacing="-1"
        dx="228">Vision</text>

  <!-- Tagline -->
  <text x="125" y="97"
        font-family="'Outfit', system-ui, sans-serif"
        font-size="16" font-weight="500"
        fill="#FE7875"
        letter-spacing="0.5">Education · Inspiration · Leadership</text>
</svg>
